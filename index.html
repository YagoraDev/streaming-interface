<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Netflix</title>
  </head>
  <body>

    <header>
      <div class="logo-container">
      <img class="logo" src="img/logo-netflix.png" alt="Logo Netflix">
      <nav>
        <ul class="menu">
          <li><a href="">Inicío</a></li>
          <li><a href="">Séries</a></li>
          <li><a href="">Filmes</a></li>
          <li><a href="">Bombando</a></li>
          <li><a href="">Minha lista</a></li>
        </ul>
      </nav>
    </div>
    <div class="avatar-container">
      <img src="img/lupa.png" alt="Icone de lupa para fazer a busca">
      <img src="img/sino.png" alt="Icone de sino para ver as notificações">
      <img class="avatar" src="img/avatar.png" alt="Icone do avatar da conta do usuário">
      <img src="img/seta.png" alt="Seta para baixo para mostrar as contas cadastradas.">
    </div>
    </header>
    
    <main>
      <div class="app-banner">
        <div class="app-banner-container">
          <img
            src="img/logo-spiderhead.png"
            alt="Logo N de netiflix e nome do filme logo abaixo."
          />
          <p>
            Em uma penitenciária de última geração, um detendo participa de um
            experimento com drogas que controlam as emoções para um gênio da
            indústria farmacêutica.
          </p>
          <button class="btn-banner-video">Assistir</button>
          <button class="btn-banner-info">Mais informações</button>
        </div>
      </div>
    </main>
  </body>
</html>
