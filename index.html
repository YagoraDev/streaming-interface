<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <title>Netflix</title>
</head>

<body>

  <header>
    <div class="menu">
      <div class="menu-logo">
        <img src="img/logo-netflix.png" alt="">
      </div>
      <nav class="menu-nav">
        <ul>
          <li><a href="#">Início</a></li>
          <li><a href="#">Séries</a></li>
          <li><a href="#">Filmes</a></li>
          <li><a href="#">Bombando</a></li>
          <li><a href="#">Minha lista</a></li>
        </ul>
      </nav>
      <div class="menu-icones">
        <img id="lupa" src="img/lupa.png" alt="Icone de pesquisa">
        <img id="sino" src="img/sino.png" alt="Icone de notificação">
        <div class="menu-avatar-container">
          <img id="avatar" src="img/avatar.png" alt="Icone de usuário">
          <img id="seta" src="img/seta.png" alt="Seta de opções">
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-container">
        <div class="hero-img">
          <img src="img/logo-spiderhead.png" alt="Logo N de netiflix e nome do filme logo abaixo." />
        </div>
        <div class="hero-descricao">
          <p>
            Em uma penitenciária de última geração, um detendo participa de um
            experimento com drogas que controlam as emoções para um gênio da
            indústria farmacêutica.
          </p>
        </div>
        <div class="hero-btn-container">
          <button class="btn-play"><img src="img/play.png" alt="Icone de play para assistir"> Assistir</button>
          <button class="btn-info"><img class="img-info" src="img/informacao.png" alt="Icone I de informação"> Mais
            informações</button>
        </div>
      </div>
    </section>
  </main>

</body>

</html>
